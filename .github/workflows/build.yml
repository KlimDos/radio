on:
  push:
    branches: main

jobs:
  build-docker:
    runs-on: ubuntu-latest
    env:
      HAS_DOCKER_CREDS: ${{ secrets.DOCKERHUB_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate semver
        id: version-generator
        shell: bash
        run: |
          set -euo pipefail
          if git describe --tags --long --always >/dev/null 2>&1; then
            ARTEFACT_VERSION=$(git describe --tags --long --always | sed -E 's/-(([^-]*-){1}[^-]*)$/.\1/')
          else
            ARTEFACT_VERSION="0.0.0-$(git rev-parse --short HEAD)"
          fi
          echo "ARTEFACT_VERSION=${ARTEFACT_VERSION}" >> "${GITHUB_ENV}"
          echo "ARTEFACT_VERSION=${ARTEFACT_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Write build version for Flask
        run: |
          echo "ARTEFACT_VERSION=${ARTEFACT_VERSION}" > src/.env

      - name: Build image
        env:
          ARTEFACT_VERSION: ${{ env.ARTEFACT_VERSION }}
        run: |
          docker build --build-arg "Build=${ARTEFACT_VERSION}" \
            -t "klimdos/radio:${ARTEFACT_VERSION}" .
          docker tag "klimdos/radio:${ARTEFACT_VERSION}" klimdos/radio:latest

      - name: Log in to Docker Hub
        if: env.HAS_DOCKER_CREDS == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        if: env.HAS_DOCKER_CREDS == 'true'
        env:
          ARTEFACT_VERSION: ${{ env.ARTEFACT_VERSION }}
        run: |
          docker push "klimdos/radio:${ARTEFACT_VERSION}"
          docker push klimdos/radio:latest
