<!DOCTYPE html>
<html lang="en">
  <head>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-7DJWRXDHYQ"
    ></script>
    <script type="text/javascript" src="static/gtag.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <noscript
      ><div>
        <img
          src="https://mc.yandex.ru/watch/91897800"
          style="position: absolute; left: -9999px"
          alt=""
        /></div
    ></noscript>
    <script type="text/javascript" src="static/yatag.js"></script>

    <title>{% block title %}{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      type="text/css"
      rel="stylesheet"
      href="{{url_for('static', filename='style.css')}}"
    />
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
  </head>

  <body id="body" class="bg-dark" tabindex="-1">

    {% block version %}{% endblock %} 
    {% block radio %}{% endblock %} 
    {% block playlist %}{% endblock %}

    <script type="text/javascript" src="static/keyboard.js"></script>
  </body>
</html>
